<!DOCTYPE html>

    p { color: #666; margin: 0 0 24px; }
    button { background: #2563eb; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .badge { display: inline-block; background: #e0f2fe; color: #0369a1; border-radius: 20px; padding: 4px 12px; font-size: 13px; margin-top: 16px; }
  </style>
</head>
